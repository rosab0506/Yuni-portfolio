[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

[[scheduled]]
  # Runs every 5 days at 00:00 UTC
  cron = "0 0 */5 * *"
  command = "supabase-keep-alive"
